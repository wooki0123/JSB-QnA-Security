<div th:insert="~{article_header :: header}"></div>

<h1 th:text="${article.title}"></h1>
<div th:text="${article.content}"></div>
<a th:href="@{/article/list}">게시글 목록</a>
<div th:if="${#authentication != null and #authentication.name != 'anonymousUser' and article.author != null and #authentication.name == article.author.username}">
    <a th:href="@{/article/modify/{id}(id=${article.id})}">수정하기</a>
    <form th:action="@{/article/delete/{id}(id=${article.id})}" method="post" style="display:inline;">
        <button type="submit">삭제</button>
    </form>
</div>
