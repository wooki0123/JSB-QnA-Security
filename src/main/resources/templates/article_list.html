<h1>게시글 목록</h1>

<table>
    <thead>
        <th>제목</th>
        <th>작성일시</th>
    </thead>
    <tbody>
        <tr th:each="article, index : ${articleList}">
            <td>
                <a th:href="@{|/article/detail/${article.id}|}" th:text="${article.title}"></a>
            </td>
            <td th:text="${article.content}"></td>
        </tr>
    </tbody>
</table>
<a th:href="@{/article/create}">등록하기</a>
