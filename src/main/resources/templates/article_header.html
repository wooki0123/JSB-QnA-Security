<header th:fragment="header">
    <a th:href="@{/}">홈으로 이동</a>
    <span th:if="${#authentication == null or #authentication.name == 'anonymousUser'}">
        <a th:href="@{/member/join}">회원가입</a>
        <a th:href="@{/member/login}">로그인</a>
    </span>
    <span th:if="${#authentication != null and #authentication.name != 'anonymousUser'}">
        <span th:text="${#authentication.name}"></span>님
        <form th:action="@{/member/logout}" method="post" style="display:inline;">
            <button type="submit">로그아웃</button>
        </form>
    </span>
</header>
